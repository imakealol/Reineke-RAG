  <rect x="390" y="520" width="155" height="50" rx="5" fill="#fff" stroke="#5e35b1"/>
  <text x="467" y="540" text-anchor="middle" class="box-title">OfficeConverter</text>
  <text x="467" y="558" text-anchor="middle" class="box-text">.doc/.xls (LibreOffice)</text>

  <rect x="555" y="520" width="155" height="50" rx="5" fill="#fff" stroke="#5e35b1"/>
  <text x="632" y="540" text-anchor="middle" class="box-title">Chunker</text>
  <text x="632" y="558" text-anchor="middle" class="box-text">Text + Tabellen-Logik</text>

  <rect x="720" y="520" width="155" height="50" rx="5" fill="#fff" stroke="#5e35b1"/>
  <text x="797" y="540" text-anchor="middle" class="box-title">OllamaClient</text>
  <text x="797" y="558" text-anchor="middle" class="box-text">Embed · Chat (HTTP)</text>

  <rect x="885" y="520" width="150" height="50" rx="5" fill="#fff" stroke="#5e35b1"/>
  <text x="960" y="540" text-anchor="middle" class="box-title">QdrantStore</text>
  <text x="960" y="558" text-anchor="middle" class="box-text">Upsert · Search</text>

  <!-- ===================== PERSISTENCE / EXTERN ===================== -->
  <rect x="40" y="605" width="1020" height="135" rx="8" fill="#fce4ec" stroke="#ad1457" stroke-width="1.5"/>
  <rect x="40" y="605" width="160" height="135" rx="8" fill="#ad1457"/>
  <text x="120" y="665" text-anchor="middle" class="layer-label">Persistenz &amp; externe</text>
  <text x="120" y="685" text-anchor="middle" class="layer-label">Dienste</text>

  <!-- SQLite -->
  <rect x="225" y="620" width="180" height="105" rx="6" fill="#fff" stroke="#ad1457"/>
  <text x="315" y="640" text-anchor="middle" class="box-title">SQLite (WAL)</text>
  <text x="315" y="657" text-anchor="middle" class="box-text">Metadaten &amp; Audit</text>
  <text x="315" y="674" text-anchor="middle" class="box-text">file_sources · documents</text>
  <text x="315" y="690" text-anchor="middle" class="box-text">ingestion_jobs</text>
  <text x="315" y="706" text-anchor="middle" class="box-text">chat_sessions · chat_messages</text>
  <text x="315" y="720" text-anchor="middle" class="box-meta">storage/rag.sqlite</text>

  <!-- Qdrant -->
  <rect x="415" y="620" width="180" height="105" rx="6" fill="#fff" stroke="#ad1457"/>
  <text x="505" y="640" text-anchor="middle" class="box-title">Qdrant :6333</text>
  <text x="505" y="657" text-anchor="middle" class="box-text">Vektor-Datenbank</text>
  <text x="505" y="674" text-anchor="middle" class="box-text">Collection: documents</text>
  <text x="505" y="690" text-anchor="middle" class="box-text">Distance: Cosine</text>
  <text x="505" y="706" text-anchor="middle" class="box-text">Payload-Index: tenant, project</text>
  <text x="505" y="720" text-anchor="middle" class="box-meta">~1024-dim (bge-m3)</text>

  <!-- Ollama -->
  <rect x="605" y="620" width="180" height="105" rx="6" fill="#fff" stroke="#ad1457"/>
  <text x="695" y="640" text-anchor="middle" class="box-title">Ollama :11434</text>
  <text x="695" y="657" text-anchor="middle" class="box-text">LLM-Runtime (lokal)</text>
  <text x="695" y="674" text-anchor="middle" class="box-text">Embedding: bge-m3 /</text>
  <text x="695" y="687" text-anchor="middle" class="box-text">mxbai-embed-large</text>
  <text x="695" y="704" text-anchor="middle" class="box-text">Chat: qwen2.5:14b/32b</text>
  <text x="695" y="720" text-anchor="middle" class="box-meta">100 % offline</text>

  <!-- Filesystem -->
  <rect x="795" y="620" width="240" height="105" rx="6" fill="#fff" stroke="#ad1457"/>
  <text x="915" y="640" text-anchor="middle" class="box-title">Dokument-Ablage</text>
  <text x="915" y="657" text-anchor="middle" class="box-text">Server-seitig gemountet</text>
  <text x="915" y="674" text-anchor="middle" class="box-text">ALLOWED_BASE_PATHS</text>
  <text x="915" y="690" text-anchor="middle" class="box-text">PDF · DOCX · DOC · XLSX · XLS</text>
  <text x="915" y="706" text-anchor="middle" class="box-text">SHA-256 · mtime-Tracking</text>
  <text x="915" y="720" text-anchor="middle" class="box-meta">Allow-list erzwingt Zugriff</text>

  <!-- ===================== FLOW ARROWS ===================== -->
  <!-- Client to API -->
  <line x1="335" y1="140" x2="335" y2="180" stroke="#1f4e79" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="575" y1="140" x2="575" y2="180" stroke="#1f4e79" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="865" y1="140" x2="865" y2="180" stroke="#1f4e79" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

