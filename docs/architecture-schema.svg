  <!-- Security to Services -->
  <line x1="352" y1="345" x2="352" y2="382" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="622" y1="345" x2="622" y2="382" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="900" y1="345" x2="900" y2="382" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

