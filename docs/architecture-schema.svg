  <line x1="352" y1="468" x2="302" y2="520" stroke="#5e35b1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="352" y1="468" x2="467" y2="520" stroke="#5e35b1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="352" y1="468" x2="632" y2="520" stroke="#5e35b1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="622" y1="468" x2="797" y2="520" stroke="#5e35b1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="900" y1="468" x2="797" y2="520" stroke="#5e35b1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="622" y1="468" x2="960" y2="520" stroke="#5e35b1" stroke-width="1.2" marker-end="url(#arrow)"/>

