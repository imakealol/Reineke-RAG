  <line x1="170" y1="430" x2="170" y2="660" stroke="#ad1457" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="170" y1="660" x2="225" y2="660" stroke="#ad1457" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="146" y="555" text-anchor="middle" class="legend" fill="#ad1457" transform="rotate(-90 146 555)">SQLAlchemy</text>

  <!-- Legend -->
  <rect x="40" y="755" width="14" height="10" fill="#1f4e79"/>
  <text x="60" y="765" class="legend">HTTP-Anfragen</text>
