  <line x1="797" y1="570" x2="695" y2="620" stroke="#ad1457" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="960" y1="570" x2="505" y2="620" stroke="#ad1457" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="302" y1="570" x2="915" y2="620" stroke="#ad1457" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="467" y1="570" x2="915" y2="620" stroke="#ad1457" stroke-width="1.2" marker-end="url(#arrow)"/>

