# Reineke-RAG retrieval quality eval-set
#
# Tailored to the ``reineke-watch`` corpus (Plasmatreat ISMS policies +
# Maßnahmenpläne + CISO Security Actions; ~62 documents, German, IT
# security domain). Run with:
#
#   pytest -m eval -v -s tests/eval/test_eval_retrieval.py
#
# Required fields per question:
#   id                  — short stable identifier (used in diff-to-last-run)
#   category            — one of: named_entity, category_query, refusal, table_extraction
#   question            — the user-facing prompt sent to /chat
#   difficulty          — easy | medium | hard (advisory only — not scored)
#
# Exactly one of these answer expectations must be set:
#   expected_doc        — case-insensitive substring expected in the file_name
#                         of at least one source (used for Recall@K + MRR)
#   expected_docs_any   — list; ANY substring matching is enough (for category
#                         questions where multiple docs could be correct)
#   expected_refusal    — true if the system MUST refuse with the
#                         "Das steht nicht eindeutig..." phrase
#
# Optional:
#   expected_keywords   — list of strings; at least one must appear in the
#                         answer text (Faithfulness). Skipped when
#                         expected_refusal: true.

# ===========================================================================
# Named-entity questions — should hit a specific Richtlinie by topic name.
# Dense-only retrieval is expected to do well here.
# ===========================================================================

- id: q01
  category: named_entity
  difficulty: easy
  question: "Welche Anforderungen stellt die Kennwort-Richtlinie an Passwörter?"
  expected_doc: "Kennwort"               # PL.ISMS007_Kennwort_Richtlinie
  expected_keywords: ["Passwort", "Kennwort", "Zeichen"]

- id: q02
  category: named_entity
  difficulty: easy
  question: "Wie ist die Backup-Strategie laut der Backup-Richtlinie geregelt?"
  expected_doc: "Backup"                 # PL.ISMS010_Backup-Richtlinie
  expected_keywords: ["Backup", "Sicherung"]

- id: q03
  category: named_entity
  difficulty: easy
  question: "Welche Regeln gibt es zu Bring Your Own Device (BYOD)?"
  expected_doc: "BYOD"                   # PL.ISMS009_Bring_your_own_device_(BYOD)_Richtlinie
  expected_keywords: ["BYOD", "eigene", "Gerät"]

- id: q04
  category: named_entity
  difficulty: easy
  question: "Wie wird mit Sicherheitsvorfällen umgegangen?"
  expected_doc: "Vorfallmanagement"      # PL.ISMS005_Verfahren_zum_Vorfallmanagement
  expected_keywords: ["Vorfall", "Meldung", "Reaktion"]

- id: q05
  category: named_entity
  difficulty: medium
  question: "Welche Regelungen gibt es für Telearbeit und Homeoffice?"
  expected_doc: "Telearbeit"             # PL.ISMS014_Richtline_zu_Mobilgeräten_Telearbeit_…
  expected_keywords: ["Telearbeit", "Homeoffice", "Heimarbeit", "Mobilgerät"]

- id: q06
  category: named_entity
  difficulty: easy
  question: "Wie werden Informationen nach der Klassifizierungsrichtlinie eingestuft?"
  expected_doc: "Klassifizierung"        # PL.ISMS015_Richtlinie_zur_Klassifizierung_von_Informationen
  expected_keywords: ["Klassifizierung", "vertraulich", "öffentlich"]

# ===========================================================================
# Category queries — fuzzy concept queries that dense-only often misses.
# Exactly the case Hybrid + Reranker should improve.
# ===========================================================================

- id: q07
  category: category_query
  difficulty: medium
  question: "Welche Regeln gelten für die Entsorgung vertraulicher Daten?"
  expected_doc: "Entsorgung"             # PL.ISMS011_Richtlinie_zur_Entsorgung_und_Vernichtung
  expected_keywords: ["Entsorgung", "Vernichtung", "schreddern"]

- id: q08
  category: category_query
  difficulty: hard
  question: "Welche Vorgaben gibt es zum Umgang mit Verschlüsselung?"
  expected_doc: "Verschlüsselung"        # PL.ISMS016_Richtlinie_des_Einsatzes_von_Verschlüsselung
  expected_keywords: ["Verschlüsselung", "AES", "Schlüssel"]

- id: q09
  category: category_query
  difficulty: hard
  question: "Welche Sicherheitsanforderungen gelten für externe Dienstleister?"
  expected_doc: "Lieferanten"            # PL.ISMS017_Sicherheitspolitik_für_Lieferanten
  expected_keywords: ["Lieferant", "Dienstleister", "extern"]

# ===========================================================================
# Table extraction — XLSX-based action plans. Hard for pypdf-style flat
# parsing; should benefit from docling in Task 4.
# ===========================================================================

- id: q10
  category: table_extraction
  difficulty: hard
  question: "Welche Maßnahmen stehen im Plasmatreat-Maßnahmenplan zu Phishing?"
  expected_doc: "Phishing"               # Plasmatreat Maßnahmenplan Phishing.xlsx
  expected_keywords: ["Phishing", "Mail"]

- id: q11
  category: table_extraction
  difficulty: hard
  question: "Was steht im Plasmatreat-Maßnahmenplan für USV?"
  expected_doc: "USV"                    # Plasmatreat Maßnahmenplan MB Systemhaus USV.xlsx
  expected_keywords: ["USV"]

# ===========================================================================
# Refusal questions — outside the corpus; system MUST refuse.
# ===========================================================================

- id: q12
  category: refusal
  difficulty: easy
  question: "Was ist der Siedepunkt von Quecksilber?"
  expected_refusal: true

- id: q13
  category: refusal
  difficulty: easy
  question: "Wer hat das Champions-League-Finale 2026 gewonnen?"
  expected_refusal: true
