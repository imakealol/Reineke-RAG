# Reineke-RAG retrieval quality eval-set
#
# Each entry produces one scored question in the eval scorecard. Run with:
#
#   pytest -m eval -v -s tests/eval/test_eval_retrieval.py
#
# Required fields per question:
#   id                  — short stable identifier (used in diff-to-last-run)
#   category            — one of: named_entity, category_query, refusal, table_extraction
#   question            — the user-facing prompt sent to /chat
#   difficulty          — easy | medium | hard (advisory only — not scored)
#
# Exactly one of these answer expectations must be set:
#   expected_doc        — case-insensitive substring expected in the file_name
#                         of at least one source (used for Recall@K + MRR)
#   expected_docs_any   — list; ANY substring matching is enough (for category
#                         questions where multiple docs could be correct)
#   expected_refusal    — true if the system MUST refuse with the
#                         "Das steht nicht eindeutig..." phrase
#
# Optional:
#   expected_keywords   — list of strings; at least one must appear in the
#                         answer text (Faithfulness). Skipped when
#                         expected_refusal: true.
#
# Editing tips:
# - Keep questions in the language your users actually use (DE here).
# - Prefer concrete questions over abstract ones — they are easier to score.
# - Mark a question "hard" if dense-only retrieval is known to miss it; that
#   is exactly the kind of question Hybrid / Reranker should fix.

# ---------------------------------------------------------------------------
# Starter set (12 questions, mostly from chat history with the amixon corpus).
# Edit / extend to your real evaluation set before merging this PR.
# ---------------------------------------------------------------------------

- id: q01
  category: named_entity
  difficulty: easy
  question: "Wurden bei Versuch 1576 Lubrizol AM 400-2591 ein VM 400 Mischer genutzt?"
  expected_doc: "1576 Lubrizol AM 400-2591"
  expected_keywords: ["Konusmischer", "AM 400-2591"]

