# ------------------------------------------------------------
# Reineke-RAG — docker compose (SKELETON for deployment-agent)
# ------------------------------------------------------------
# This is a skeleton. The deployment-agent (see docs/06_AGENT_BRIEFS.md §1)
# fills it in during Phase 1, pinning image tags and completing healthchecks.
# See docs/02_ARCHITECTURE.md for the full component list and semantics.
# ------------------------------------------------------------
version: "3.9"

x-common-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  TZ: ${TZ:-Europe/Berlin}

networks:
  reineke:
    name: reineke
    driver: bridge

volumes:
  postgres:         { driver: local }
  authentik-db:     { driver: local }
  langfuse-db:      { driver: local }
  redis:            { driver: local }
  minio:            { driver: local }
  qdrant:           { driver: local }
  duckdb:           { driver: local }
  ollama:           { driver: local }
  tei:              { driver: local }
  docling:          { driver: local }
  loki:             { driver: local }
  grafana:          { driver: local }

# ------------------------------------------------------------
# 1. reverse proxy
# ------------------------------------------------------------
services:

  caddy:
    image: caddy:2-alpine              # deployment-agent: pin exact minor
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CONFIG_ROOT:-./config}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_ROOT:-./data}/caddy/data:/data
      - ${DATA_ROOT:-./data}/caddy/config:/config
    environment: { <<: *common-env }
    networks: [reineke]
    logging: *default-logging

  # ----------------------------------------------------------
  # 2. Authentik (identity)
  # ----------------------------------------------------------
  authentik-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      POSTGRES_DB: authentik
      <<: *common-env
    volumes: [authentik-db:/var/lib/postgresql/data]
    networks: [reineke]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "authentik"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes: [authentik-redis:/data]
    networks: [reineke]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s }
    logging: *default-logging

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.8   # auth-agent pins latest stable
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${ADMIN_EMAIL}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
      <<: *common-env
    volumes:
      - ${CONFIG_ROOT:-./config}/authentik/blueprints:/blueprints:ro
    depends_on:
      authentik-db:    { condition: service_healthy }
      authentik-redis: { condition: service_healthy }
    networks: [reineke]
    logging: *default-logging

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.8
    restart: unless-stopped
    command: worker
    environment: *common-env      # auth-agent completes; same as server
    depends_on: [authentik-server]
    networks: [reineke]
    logging: *default-logging

  # ----------------------------------------------------------
  # 3. App DB + cache
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      <<: *common-env
    volumes:
      - postgres:/var/lib/postgresql/data
      - ${CONFIG_ROOT:-./config}/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [reineke]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rag"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes: [redis:/data]
    networks: [reineke]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s }
    logging: *default-logging

  # ----------------------------------------------------------
  # 4. Object store + vector store
  # ----------------------------------------------------------
  minio:
    image: quay.io/minio/minio:RELEASE.2024-08-03T04-33-23Z
    restart: unless-stopped
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      <<: *common-env
    volumes: [minio:/data]
    networks: [reineke]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      <<: *common-env
    volumes: [qdrant:/qdrant/storage]
    networks: [reineke]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 10s
    logging: *default-logging

  # ----------------------------------------------------------
  # 5. LLMs + embeddings + reranker
  # ----------------------------------------------------------
  # Ollama runs NATIVELY on macOS (see ADR-010). In that mode it's
  # NOT part of Compose; retrieval-api/ingestion-worker reach it
  # via `OLLAMA_URL=http://host.docker.internal:11434`.
  # On Linux + GPU, activate the `ollama-docker` profile to bring
  # the container into the stack.
  ollama:
    image: ollama/ollama:0.3.12
    profiles: ["ollama-docker"]
    restart: unless-stopped
    environment:
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      <<: *common-env
    volumes: [ollama:/root/.ollama]
    networks: [reineke]
    # On Linux hosts with NVIDIA GPU, uncomment the block below
    # (deployment-agent completes per detected host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    logging: *default-logging

  ollama-init:
    # one-shot; pulls models then exits. Active only with ollama-docker profile.
    image: ollama/ollama:0.3.12
    profiles: ["ollama-docker"]
    depends_on: [ollama]
    volumes: [ollama:/root/.ollama]
    networks: [reineke]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for m in "$$LLM_FAST" "$$LLM_REASONING" "$$EMBED_MODEL" ; do
          echo "Pulling $$m" && ollama --host http://ollama:11434 pull "$$m"
        done
        if [ "$$LLM_PROFILE" = "heavy-70b" ]; then
          ollama --host http://ollama:11434 pull "$$LLM_HEAVY"
        fi
    environment:
      LLM_FAST: ${LLM_FAST}
      LLM_REASONING: ${LLM_REASONING}
      LLM_HEAVY: ${LLM_HEAVY}
      EMBED_MODEL: ${EMBED_MODEL}
      LLM_PROFILE: ${LLM_PROFILE:-default}

  # Reranker — on Linux GPU, use TEI; on Apple Silicon, use our
  # sentence-transformers + MPS service (ADR-010). RERANK_MODE picks which.
  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    profiles: ["rerank-tei"]
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-reranker-v2-m3", "--port", "8080", "--max-concurrent-requests", "4"]
    volumes: [tei:/data]
    networks: [reineke]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
    logging: *default-logging

  reranker:
    # Default on macOS: PyTorch MPS backend via sentence-transformers.
    build: ../services/reranker
    profiles: ["rerank-st"]
    restart: unless-stopped
    environment:
      RERANK_MODEL: ${RERANK_MODEL}
      <<: *common-env
    networks: [reineke]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/healthz"]
      interval: 20s
    logging: *default-logging

  # ----------------------------------------------------------
  # 6. Custom services (built locally)
  # ----------------------------------------------------------
  docling:
    build: ../services/docling           # ingestion-agent creates
    restart: unless-stopped
    volumes: [docling:/root/.cache]
    networks: [reineke]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 15s
    logging: *default-logging

  ingestion-api:
    build: ../services/ingestion-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://rag:${POSTGRES_PASSWORD}@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: http://ollama:11434
      DOCLING_URL: http://docling:8001
      DUCKDB_URL: http://duckdb-api:8030
      EMBED_MODEL: ${EMBED_MODEL}
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-512}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      JWT_JWKS_URL: http://authentik-server:9000/application/o/retrieval-api/jwks/
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      minio:    { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      docling:  { condition: service_healthy }
    networks: [reineke]
    logging: *default-logging

  ingestion-worker:
    build: ../services/ingestion-api
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    environment: *common-env          # same env block as ingestion-api; deployment-agent DRYs this
    depends_on: [ingestion-api]
    networks: [reineke]
    logging: *default-logging

  retrieval-api:
    build: ../services/retrieval-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"        # Linux parity for OLLAMA_MODE=native
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      RERANK_URL: ${RERANK_URL:-http://reranker:8090}
      DUCKDB_URL: http://duckdb-api:8030
      DATABASE_URL: postgres://rag:${POSTGRES_PASSWORD}@postgres:5432/rag
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      EMBED_MODEL: ${EMBED_MODEL}
      RERANK_MODEL: ${RERANK_MODEL}
      LLM_FAST: ${LLM_FAST}
      LLM_REASONING: ${LLM_REASONING}
      LLM_HEAVY: ${LLM_HEAVY}
      LLM_PROFILE: ${LLM_PROFILE:-default}
      TOP_K_DENSE: ${TOP_K_DENSE:-50}
      TOP_K_SPARSE: ${TOP_K_SPARSE:-50}
      TOP_K_RERANK: ${TOP_K_RERANK:-12}
      FULL_DOC_CONTEXT_THRESHOLD: ${FULL_DOC_CONTEXT_THRESHOLD:-20480}
      SCOPE_MIN_CONFIDENCE: ${SCOPE_MIN_CONFIDENCE:-0.5}
      JWT_JWKS_URL: http://authentik-server:9000/application/o/retrieval-api/jwks/
      <<: *common-env
    volumes:
      - ${CONFIG_ROOT:-./config}/retrieval/prompts:/app/prompts:ro
      - ${CONFIG_ROOT:-./config}/retrieval/models.yaml:/app/models.yaml:ro
    depends_on: [qdrant, duckdb-api, postgres]      # ollama/rerank are dynamically addressed
    networks: [reineke]
    logging: *default-logging

  duckdb-api:
    build: ../services/duckdb-api
    restart: unless-stopped
    environment:
      DUCKDB_FILE: /data/reineke.duckdb
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      JWT_JWKS_URL: http://authentik-server:9000/application/o/retrieval-api/jwks/
      <<: *common-env
    volumes: [duckdb:/data]
    networks: [reineke]
    logging: *default-logging

  # ----------------------------------------------------------
  # 7. UI
  # ----------------------------------------------------------
  openwebui:
    image: ghcr.io/open-webui/open-webui:main        # ui-agent pins sha tag
    restart: unless-stopped
    environment:
      WEBUI_URL: https://${PRIMARY_DOMAIN}/
      WEBUI_AUTH: oauth
      OAUTH_PROVIDER_NAME: Authentik
      OAUTH_CLIENT_ID: ${OIDC_CLIENT_ID_OPENWEBUI}
      OAUTH_CLIENT_SECRET: ${OIDC_CLIENT_SECRET_OPENWEBUI}
      OPENID_PROVIDER_URL: https://${PRIMARY_DOMAIN}/application/o/openwebui/
      ENABLE_OLLAMA_API: "false"
      OLLAMA_BASE_URL: http://ollama:11434      # unused but required by validation
      ENABLE_PIPELINES: "true"
      PIPELINES_URLS: http://pipelines:9099
      ENABLE_TELEMETRY: "false"
      <<: *common-env
    depends_on: [pipelines]
    networks: [reineke]
    logging: *default-logging

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    restart: unless-stopped
    environment:
      RETRIEVAL_API_URL: http://retrieval-api:8020
      <<: *common-env
    volumes:
      - ${CONFIG_ROOT:-./config}/pipelines:/app/pipelines:ro
    depends_on: [retrieval-api]
    networks: [reineke]
    logging: *default-logging

  # ----------------------------------------------------------
  # 8. Observability
  # ----------------------------------------------------------
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
    volumes: [langfuse-db:/var/lib/postgresql/data]
    networks: [reineke]
    healthcheck: { test: ["CMD", "pg_isready", "-U", "langfuse"], interval: 10s }
    logging: *default-logging

  langfuse:
    image: langfuse/langfuse:2.71
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      NEXTAUTH_URL: https://${PRIMARY_DOMAIN}/langfuse
      TELEMETRY_ENABLED: "false"
      LANGFUSE_DEFAULT_PROJECT_ID: reineke
    depends_on: [langfuse-db]
    networks: [reineke]
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ${CONFIG_ROOT:-./config}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DATA_ROOT:-./data}/prometheus:/prometheus
    networks: [reineke]
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://${PRIMARY_DOMAIN}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Authentik
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${OIDC_CLIENT_ID_GRAFANA}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${OIDC_CLIENT_SECRET_GRAFANA}
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://${PRIMARY_DOMAIN}/application/o/authorize/
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://${PRIMARY_DOMAIN}/application/o/token/
      GF_AUTH_GENERIC_OAUTH_API_URL: https://${PRIMARY_DOMAIN}/application/o/userinfo/
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*],'admin') && 'Admin' || 'Viewer'"
    volumes:
      - grafana:/var/lib/grafana
      - ${CONFIG_ROOT:-./config}/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [reineke]
    logging: *default-logging

  loki:
    image: grafana/loki:2.9.10
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki:/loki
      - ${CONFIG_ROOT:-./config}/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks: [reineke]
    logging: *default-logging

  promtail:
    image: grafana/promtail:2.9.10
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_ROOT:-./config}/loki/promtail-config.yaml:/etc/promtail/config.yaml:ro
    networks: [reineke]
    logging: *default-logging

  # ----------------------------------------------------------
  # 9. Optional automation profile (n8n + watcher)
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.60.0
    profiles: ["automation"]
    restart: unless-stopped
    environment:
      N8N_HOST: ${PRIMARY_DOMAIN}
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      N8N_PORT: 5678
      N8N_SECURE_COOKIE: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_AUTH_OIDC_ENABLED: "true"
      N8N_AUTH_OIDC_ISSUER: https://${PRIMARY_DOMAIN}/application/o/n8n/
      N8N_AUTH_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID_N8N}
      N8N_AUTH_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET_N8N}
    volumes:
      - ${DATA_ROOT:-./data}/n8n:/home/node/.n8n
    networks: [reineke]
    logging: *default-logging

  watcher:
    build: ../services/watcher
    profiles: ["automation"]
    restart: unless-stopped
    environment:
      WATCH_ROOT: /watch
      INGESTION_API_URL: http://ingestion-api:8010
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    volumes:
      - ${WATCH_ROOT:-/Volumes/Docs}:/watch:ro
    depends_on: [ingestion-api]
    networks: [reineke]
    logging: *default-logging
